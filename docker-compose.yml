version: "3.9"

services:

  mongodb:
    image: mongo
    container_name: secumern-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:16
    container_name: secumern-postgres
    environment:
      POSTGRES_USER: secumern
      POSTGRES_PASSWORD: secumern
      POSTGRES_DB: secumern
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  mongo_data:
  postgres_data: